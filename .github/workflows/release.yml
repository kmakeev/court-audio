name: Release

# Публикация дистрибутивов «Аудиопротокол» как GitHub Release.
# Триггер — пуш тега vX.Y.Z (напр. `git tag v0.1.0 && git push origin v0.1.0`).
# Матрица macOS + Ubuntu + Windows собирает установщики, отдельная джоба publish
# прикрепляет их к ЧЕРНОВИКУ релиза (draft) — публикацию подтверждает человек.
#
# Секреты не обязательны: без них релиз соберётся неподписанным, а Windows —
# в онлайн-варианте (downloadBootstrapper). Для боевой поставки задать секреты
# (Repository secrets): WEBVIEW2_FIXED_URL (оффлайн-Windows), подпись Win/GPG —
# см. docs/packaging.md. Отечественные Astra SE / РЕД ОС — стенд
# (package-domestic.yml), не этот workflow.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # требуется для создания релиза и заливки артефактов

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Установка системных зависимостей Tauri (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            libasound2-dev \
            patchelf \
            rpm

      - name: Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Кэш cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Установка npm-зависимостей
        run: npm ci

      - name: Сборка фронтенда (tsc + vite)
        run: npm run build

      # Оффлайн-рантайм WebView2 (как в ci.yml): если секрет задан — кладём фикс-
      # версию и собираем оффлайн-Windows; иначе онлайн-fallback.
      - name: Оффлайн-рантайм WebView2 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          WEBVIEW2_FIXED_URL: ${{ secrets.WEBVIEW2_FIXED_URL }}
        run: |
          if ($env:WEBVIEW2_FIXED_URL) {
            Invoke-WebRequest -Uri $env:WEBVIEW2_FIXED_URL -OutFile webview2.cab
            New-Item -ItemType Directory -Force -Path src-tauri/webview2 | Out-Null
            expand webview2.cab -F:* src-tauri/webview2 | Out-Null
            "WEBVIEW2_OFFLINE=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Host "WEBVIEW2_FIXED_URL не задан — релизная Windows-сборка онлайн (downloadBootstrapper)."
          }

      - name: Сборка Tauri-приложения (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: npm run tauri build

      - name: Сборка Tauri-приложения (Windows, оффлайн-рантайм в бандле)
        if: matrix.os == 'windows-latest' && env.WEBVIEW2_OFFLINE == '1'
        run: npm run tauri build

      - name: Сборка Tauri-приложения (Windows, fallback без оффлайн-рантайма)
        if: matrix.os == 'windows-latest' && env.WEBVIEW2_OFFLINE != '1'
        shell: bash
        run: npm run tauri build -- --config '{"bundle":{"windows":{"webviewInstallMode":{"type":"downloadBootstrapper","path":null}}}}'

      - name: Артефакт релиза (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Артефакт релиза (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Артефакт релиза (macOS, dev)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Сбор артефактов всех ОС
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Публикация draft-релиза с установщиками
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: Аудиопротокол ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: dist/**/*
