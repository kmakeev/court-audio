name: CI

# Сборка и проверки каркаса «Аудиопротокол» под целевые ОС этапа 00:
# macOS + Ubuntu + Windows. Отечественные Astra SE / РЕД ОС — этап 08
# (без правок кода). См. promts/00_infra.md.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Установка системных зависимостей Tauri (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            patchelf

      - name: Rust (stable + fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Кэш cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Установка npm-зависимостей
        run: npm ci

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Сборка фронтенда (tsc + vite)
        run: npm run build

      - name: Сборка Tauri-приложения
        run: npm run tauri build

      - name: Артефакты сборки (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: audioprotocol-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
